<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARLEND | Магазин игровой валюты</title>
    <style>
        :root {
            --gold: #FFD700;
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
            --success: #27ae60;
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0;
            line-height: 1.5;
        }

        /* Шапка */
        header { 
            padding: 60px 20px; 
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--bg)), 
                        url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .logo { 
            font-size: 3.5rem; 
            font-weight: 900; 
            letter-spacing: 10px; 
            color: var(--gold); 
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            margin: 0;
        }
        
        .tagline { opacity: 0.6; letter-spacing: 3px; font-size: 0.9rem; margin-top: 10px; text-transform: uppercase; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Категории */
        .section-title { 
            display: flex; 
            align-items: center; 
            margin: 40px 0 25px; 
            font-size: 1.5rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); margin-left: 20px; }

        /* Карточки */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card); 
            border-radius: 24px; 
            padding: 30px; 
            text-align: center; 
            border: 1px solid #222;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1); }
        
        .item-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
        .item-price { font-size: 2rem; font-weight: 800; color: var(--gold); margin-bottom: 25px; }

        .btn-buy { 
            background: var(--gold); 
            color: #000; 
            border: none; 
            width: 100%; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 800; 
            font-size: 1rem; 
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-buy:active { transform: scale(0.95); }

        /* Модалка */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: #111; 
            width: 90%; 
            max-width: 400px; 
            padding: 40px; 
            border-radius: 32px; 
            border: 1px solid #333; 
            text-align: center;
        }

        input { 
            width: 100%; 
            padding: 18px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 12px; 
            color: #fff; 
            font-size: 1.1rem; 
            margin: 20px 0; 
            text-align: center;
            box-sizing: border-box;
        }

        .payment-card { 
            background: #1a1a1a; 
            border: 2px dashed var(--gold); 
            padding: 20px; 
            border-radius: 16px; 
            margin: 20px 0; 
            cursor: pointer;
        }
        .payment-card b { font-size: 1.2rem; color: var(--gold); }

        .btn-pay { background: var(--success); color: white; margin-top: 10px; }

        footer { text-align: center; padding: 60px 20px; opacity: 0.5; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">DARLEND</div>
    <div class="tagline">World of digital currency</div>
</header>

<div class="container">
    <div class="section-title">PUBG Mobile (по UID)</div>
    <div class="grid" id="pubg-list"></div>

    <div class="section-title">Brawl Stars (по почте)</div>
    <div class="grid" id="brawl-list"></div>
</div>

<footer>
    &copy; 2024 DARLEND Shop. Все права защищены.<br>
    <a href="https://t.me" style="color: var(--gold); text-decoration: none; margin-top: 10px; display: inline-block;">Наш Telegram & Отзывы</a>
</footer>

<!-- Окно оформления -->
<div id="shopModal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="margin-top:0; color:var(--gold);"></h2>
        <p id="m-desc"></p>
        
        <div id="step-1">
            <input type="text" id="user-input" placeholder="Введите данные">
            <button class="btn-buy" onclick="toPayment()">Продолжить</button>
        </div>

        <div id="step-2" style="display:none;">
            <p>Сумма: <b id="m-price" style="color:var(--gold)"></b> ₽</p>
            <p style="font-size: 0.85rem">Переведите на карту <b>Ozon Банк</b>:</p>
            <div class="payment-card" onclick="copyCardNum()">
                <b id="card-num">2204 3211 4831 8157</b><br>
                <small>(нажми, чтобы скопировать)</small>
            </div>
            <p style="font-size: 0.8rem; color: #888;">После оплаты нажми кнопку ниже для подтверждения в Telegram.</p>
            <button class="btn-buy btn-pay" onclick="finishOrder()">✅ Я оплатил(-а)</button>
        </div>
        
        <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script>
    const pubg = [
        {n: "60 UC", p: 79}, {n: "325 UC", p: 369}, {n: "660 UC", p: 789},
        {n: "1800 UC", p: 1949}, {n: "3850 UC", p: 3879}, {n: "8100 UC", p: 7749}
    ];
    const brawl = [
        {n: "Brawl Pass", p: 819}, {n: "Brawl Pass Plus", p: 1169},
        {n: "30 Гемов", p: 194}, {n: "360 Гемов", p: 1789}
    ];

    let current = {};

    function init() {
        const pDiv = document.getElementById('pubg-list');
        pubg.forEach(i => {
            pDiv.innerHTML += `<div class="card"><div class="item-name">${i.n}</div><div class="item-price">${i.p} ₽</div><button class="btn-buy" onclick="openModal('${i.n}', ${i.p}, 'UID')">Купить</button></div>`;
        });

        const bDiv = document.getElementById('brawl-list');
        brawl.forEach(i => {
            bDiv.innerHTML += `<div class="card"><div class="item-name">${i.n}</div><div class="item-price">${i.p} ₽</div><button class="btn-buy" onclick="openModal('${i.n}', ${i.p}, 'Почту Supercell ID')">Купить</button></div>`;
        });
    }

    function openModal(name, price, type) {
        current = {name, price, type};
        document.getElementById('m-title').innerText = name;
        document.getElementById('m-desc').innerText = "Введите ваш " + type;
        document.getElementById('m-price').innerText = price;
        document.getElementById('shopModal').style.display = 'flex';
        document.getElementById('step-1').style.display = 'block';
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('user-input').value = "";
    }

    function toPayment() {
        if(document.getElementById('user-input').value.length < 3) return alert('Введите данные!');
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function copyCardNum() {
        const temp = document.createElement('textarea');
        temp.value = '2204321148318157';
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        alert('Номер карты Ozon скопирован!');
    }

    function closeModal() { document.getElementById('shopModal').style.display = 'none'; }

    function finishOrder() {
        const val = document.getElementById('user-input').value;
        const msg = `🚀 НОВЫЙ ЗАКАЗ В DARLEND\n--------------------------\n🛒 Товар: ${current.name}\n🔑 Данные: ${val}\n💰 К оплате: ${current.price} ₽\n--------------------------\nКлиент сообщил об оплате на Ozon Банк. Ожидайте подтверждения.`;
        
        window.location.href = `https://t.me?text=${encodeURIComponent(msg)}`;
        
        setTimeout(() => {
            alert('Вас переводит в Telegram. Отправьте сообщение в чат!');
            closeModal();
        }, 500);
    }

    init();
</script>
</body>
</html>
