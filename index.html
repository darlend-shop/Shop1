<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARLEND | Магазин</title>
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #161616; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        header { padding: 40px 20px; border-bottom: 1px solid #333; background: #000; }
        .logo { font-size: 2.5rem; font-weight: bold; color: var(--gold); letter-spacing: 5px; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .section-title { text-align: left; margin: 30px 0 15px; color: var(--gold); text-transform: uppercase; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; }
        .price { font-size: 1.6rem; color: var(--gold); margin: 10px 0; font-weight: bold; }
        .btn { background: var(--gold); border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; border: 1px solid #444; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; text-align: center; box-sizing: border-box; }
        .copy-box { background: #222; border: 2px dashed var(--gold); padding: 15px; border-radius: 10px; margin: 15px 0; cursor: pointer; }
        .btn-pay { background: #27ae60; color: #fff; }
    </style>
</head>
<body>

<header><div class="logo">DARLEND</div></header>

<div class="container">
    <div class="section-title">PUBG Mobile (UID)</div>
    <div id="pubg-list" class="grid"></div>
    <div class="section-title">Brawl Stars (Mail)</div>
    <div id="brawl-list" class="grid"></div>
</div>

<div id="shopModal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="color:var(--gold); margin-top:0;"></h2>
        <div id="step-1">
            <input type="text" id="user-input" placeholder="Введите данные">
            <button class="btn" onclick="nextStep()">Далее</button>
        </div>
        <div id="step-2" style="display:none;">
            <p>Сумма: <b id="m-price" style="color:var(--gold)"></b> ₽</p>
            <div class="copy-box" onclick="copyCard()">
                <b>2204 3211 4831 8157</b><br>
                <small>(нажми для копирования)</small>
            </div>
            <button class="btn btn-pay" onclick="sendOrder()">✅ Я оплатил(-а)</button>
        </div>
        <button onclick="closeModal()" style="background:none; border:none; color:#777; margin-top:15px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script>
    var pubg = [{n:"60 UC", p:79}, {n:"325 UC", p:369}, {n:"660 UC", p:789}, {n:"1800 UC", p:1949}, {n:"3850 UC", p:3879}, {n:"8100 UC", p:7749}];
    var brawl = [{n:"Brawl Pass", p:819}, {n:"Brawl Pass Plus", p:1169}, {n:"30 Гемов", p:194}, {n:"360 Гемов", p:1789}];
    var current = {};

    function init() {
        var pL = document.getElementById('pubg-list');
        for(var i=0; i<pubg.length; i++) {
            pL.innerHTML += '<div class="card"><div>'+pubg[i].n+'</div><div class="price">'+pubg[i].p+' ₽</div><button class="btn" onclick="openM(\''+pubg[i].n+'\','+pubg[i].p+',\'UID\')">Купить</button></div>';
        }
        var bL = document.getElementById('brawl-list');
        for(var j=0; j<brawl.length; j++) {
            bL.innerHTML += '<div class="card"><div>'+brawl[j].n+'</div><div class="price">'+brawl[j].p+' ₽</div><button class="btn" onclick="openM(\''+brawl[j].n+'\','+brawl[j].p+',\'Почту\')">Купить</button></div>';
        }
    }

    function openM(n, p, t) {
        current = {n:n, p:p, t:t};
        document.getElementById('m-title').innerText = n;
        document.getElementById('user-input').placeholder = "Введите ваш " + t;
        document.getElementById('m-price').innerText = p;
        document.getElementById('shopModal').style.display = 'flex';
        document.getElementById('step-1').style.display = 'block';
        document.getElementById('step-2').style.display = 'none';
    }

    function nextStep() {
        if(document.getElementById('user-input').value.length < 3) return alert('Введите данные!');
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function copyCard() {
        var t = document.createElement('textarea'); t.value = '2204321148318157';
        document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
        alert('Карта скопирована!');
    }

    function closeModal() { document.getElementById('shopModal').style.display = 'none'; }

    function sendOrder() {
        var val = document.getElementById('user-input').value;
        var text = "🚀 ЗАКАЗ DARLEND\nТовар: " + current.n + "\nДанные: " + val + "\nЦена: " + current.p + " ₽";
        
        // Склеиваем ссылку через обычный плюс, чтобы не было ошибок
        var link = "https://t.me" + encodeURIComponent(text);
        
        window.location.href = link;
    }

    init();
</script>
</body>
</html>
