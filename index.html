<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARLEND | Store</title>
    <style>
        :root { --gold: #FFD700; --bg: #050505; --card: #121212; --text: #ffffff; --success: #27ae60; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { padding: 40px 20px; text-align: center; background: #000; border-bottom: 1px solid #222; }
        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; color: var(--gold); margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section-title { margin: 30px 0 15px; font-size: 1.1rem; text-transform: uppercase; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #222; }
        .price { font-size: 1.7rem; font-weight: 800; color: var(--gold); margin: 15px 0; }
        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; display: block; text-decoration: none; font-size: 1rem; box-sizing: border-box; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; width: 90%; max-width: 380px; padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center; box-sizing: border-box; }
        input { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; margin: 15px 0; text-align: center; box-sizing: border-box; }
        .copy-box { background: #1a1a1a; border: 2px dashed var(--gold); padding: 15px; border-radius: 12px; margin: 15px 0; cursor: pointer; }
        .btn-pay { background: var(--success); color: white; line-height: 1.2; padding-top: 15px; }
    </style>
</head>
<body>

<header><div class="logo">DARLEND</div></header>

<div class="container">
    <div class="section-title">PUBG Mobile</div>
    <div id="pubg-list" class="grid"></div>
    <div class="section-title">Brawl Stars</div>
    <div id="brawl-list" class="grid"></div>
</div>

<div id="shopModal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="margin:0; color:var(--gold);"></h2>
        <div id="step-1">
            <input type="text" id="user-input" placeholder="Введите данные">
            <button class="btn" onclick="toStep2()">Продолжить</button>
        </div>
        <div id="step-2" style="display:none;">
            <p>Сумма: <b id="m-price" style="color:var(--gold)"></b> ₽</p>
            <div class="copy-box" onclick="copyCardNum()">
                <b>2204 3211 4831 8157</b><br><small>(нажми для копирования)</small>
            </div>
            <!-- САМОЕ ВАЖНОЕ: Прямая ссылка <a> вместо скрипта -->
            <a href="#" id="finalPayBtn" class="btn btn-pay">✅ Я оплатил(-а)</a>
        </div>
        <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script>
    var pubg = [{n:"60 UC", p:79}, {n:"325 UC", p:369}, {n:"660 UC", p:789}, {n:"1800 UC", p:1949}, {n:"3850 UC", p:3879}, {n:"8100 UC", p:7749}];
    var brawl = [{n:"Brawl Pass", p:819}, {n:"Brawl Pass Plus", p:1169}, {n:"30 Гемов", p:194}, {n:"360 Гемов", p:1789}];
    var current = {};

    function init() {
        var pL = document.getElementById('pubg-list');
        pubg.forEach(function(i){ pL.innerHTML += '<div class="card"><div>'+i.n+'</div><div class="price">'+i.p+' ₽</div><button class="btn" onclick="openM(\''+i.n+'\','+i.p+',\'UID\')">Купить</button></div>'; });
        var bL = document.getElementById('brawl-list');
        brawl.forEach(function(i){ bL.innerHTML += '<div class="card"><div>'+i.n+'</div><div class="price">'+i.p+' ₽</div><button class="btn" onclick="openM(\''+i.n+'\','+i.p+',\'Почту\')">Купить</button></div>'; });
    }

    function openM(n, p, t) {
        current = {n:n, p:p, t:t};
        document.getElementById('m-title').innerText = n;
        document.getElementById('user-input').placeholder = "Ваш " + t;
        document.getElementById('m-price').innerText = p;
        document.getElementById('shopModal').style.display = 'flex';
        document.getElementById('step-1').style.display = 'block';
        document.getElementById('step-2').style.display = 'none';
    }

    function toStep2() {
        var val = document.getElementById('user-input').value;
        if(val.length < 3) return alert('Введите данные!');
        
        // Формируем ссылку ЗАРАНЕЕ
        var text = "🚀 ЗАКАЗ DARLEND\nТовар: "+current.n+"\nДанные: "+val+"\nСумма: "+current.p+" ₽\nОплачено.";
        document.getElementById('finalPayBtn').href = "https://t.me" + encodeURIComponent(text);
        
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function copyCardNum() {
        var t = document.createElement('textarea'); t.value = '2204321148318157';
        document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
        alert('Карта скопирована!');
    }

    function closeModal() { document.getElementById('shopModal').style.display = 'none'; }

    init();
</script>
</body>
</html>
