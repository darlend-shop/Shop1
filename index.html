<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARLEND | 2026 Store</title>
    <style>
        :root { --gold: #FFD700; --bg: #050505; --card: #121212; --text: #ffffff; --success: #27ae60; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { padding: 50px 20px; text-align: center; background: #000; border-bottom: 1px solid #222; }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: 10px; color: var(--gold); margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section-title { margin: 30px 0 15px; font-size: 1.2rem; text-transform: uppercase; color: var(--gold); border-left: 4px solid var(--gold); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #222; }
        .item-price { font-size: 1.8rem; font-weight: 800; color: var(--gold); margin: 15px 0; }
        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-pay { background: var(--success); color: white; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; width: 90%; max-width: 380px; padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center; box-sizing: border-box; }
        input { width: 100%; padding: 18px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 1.1rem; margin: 15px 0; text-align: center; box-sizing: border-box; }
        .copy-box { background: #1a1a1a; border: 2px dashed var(--gold); padding: 15px; border-radius: 12px; margin: 15px 0; cursor: pointer; }
    </style>
</head>
<body>

<header><div class="logo">DARLEND</div></header>

<div class="container">
    <div class="section-title">PUBG Mobile (UID)</div>
    <div id="pubg-list" class="grid"></div>
    <div class="section-title">Brawl Stars (Mail)</div>
    <div id="brawl-list" class="grid"></div>
</div>

<div id="shopModal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="margin:0; color:var(--gold);"></h2>
        <div id="step-1">
            <input type="text" id="user-input" placeholder="Введите данные">
            <button class="btn" onclick="toStep2()">Продолжить</button>
        </div>
        <div id="step-2" style="display:none;">
            <p>К оплате: <b id="m-price" style="color:var(--gold)"></b> ₽</p>
            <div class="copy-box" onclick="copyCardNum()">
                <b>2204 3211 4831 8157</b><br><small>(нажми для копирования)</small>
            </div>
            <p style="font-size: 0.7rem; color: #888;">После оплаты нажми кнопку ниже.</p>
            <!-- ТУТ ИЗМЕНЕНА ЛОГИКА -->
            <button class="btn btn-pay" id="finalPayBtn">✅ Я оплатил(-а)</button>
        </div>
        <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script>
    var pubg = [{n:"60 UC", p:79}, {n:"325 UC", p:369}, {n:"660 UC", p:789}, {n:"1800 UC", p:1949}, {n:"3850 UC", p:3879}, {n:"8100 UC", p:7749}];
    var brawl = [{n:"Brawl Pass", p:819}, {n:"Brawl Pass Plus", p:1169}, {n:"30 Гемов", p:194}, {n:"360 Гемов", p:1789}];
    var current = {};

    function initStore() {
        var pL = document.getElementById('pubg-list');
        for(var i=0; i<pubg.length; i++){
            pL.innerHTML += '<div class="card"><div>'+pubg[i].n+'</div><div class="item-price">'+pubg[i].p+' ₽</div><button class="btn" onclick="openM(\''+pubg[i].n+'\','+pubg[i].p+',\'UID\')">Купить</button></div>';
        }
        var bL = document.getElementById('brawl-list');
        for(var j=0; j<brawl.length; j++){
            bL.innerHTML += '<div class="card"><div>'+brawl[j].n+'</div><div class="item-price">'+brawl[j].p+' ₽</div><button class="btn" onclick="openM(\''+brawl[j].n+'\','+brawl[j].p+',\'Почту\')">Купить</button></div>';
        }
    }

    function openM(n, p, t) {
        current = {n:n, p:p, t:t};
        document.getElementById('m-title').innerText = n;
        document.getElementById('user-input').placeholder = "Введите ваш " + t;
        document.getElementById('m-price').innerText = p;
        document.getElementById('shopModal').style.display = 'flex';
        document.getElementById('step-1').style.display = 'block';
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('user-input').value = "";
    }

    function toStep2() {
        if(document.getElementById('user-input').value.length < 3) return alert('Введите данные!');
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function copyCardNum() {
        var t = document.createElement('textarea'); t.value = '2204321148318157';
        document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
        alert('Карта скопирована!');
    }

    function closeModal() { document.getElementById('shopModal').style.display = 'none'; }

    // ГЛАВНОЕ ИСПРАВЛЕНИЕ ТУТ
    document.getElementById('finalPayBtn').onclick = function() {
        var val = document.getElementById('user-input').value;
        var msg = "🚀 ЗАКАЗ DARLEND\nТовар: " + current.n + "\nДанные: " + val + "\nЦена: " + current.p + " ₽\nОплачено на Ozon.";
        
        var link = "https://t.me" + encodeURIComponent(msg);
        
        // Создаем невидимый элемент ссылки и кликаем по нему
        var anchor = document.createElement('a');
        anchor.href = link;
        anchor.target = '_blank';
        anchor.rel = 'noopener noreferrer';
        anchor.click();
        
        closeModal();
    };

    window.onload = initStore;
</script>
</body>
</html>
